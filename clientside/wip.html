<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiverse Browser</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="browser-window">
        <div class="browser-header">
            <div class="window-controls">
                <div class="control close"></div>
                <div class="control minimize"></div>
                <div class="control maximize"></div>
            </div>
            <div class="tab-bar">
                <div class="tab active" data-tab-id="0">
                    <span class="tab-title">Multiverse Browser</span>
                    <button class="tab-close">×</button>
                </div>
                <button class="new-tab-btn" title="New Tab">+</button>
            </div>
        </div>
        
        <div class="browser-toolbar">
            <div class="nav-controls">
                <button class="nav-btn" id="back-btn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <button class="nav-btn" id="forward-btn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
                <button class="nav-btn" id="refresh-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                    </svg>
                </button>
            </div>
            
            <div class="address-bar">
                <input type="text" id="url-input" placeholder="Enter universe or URL..." />
                <button id="go-btn">Go</button>
            </div>
            
            <div class="browser-menu">
                <button id="menu-btn">☰</button>
                <div class="menu-dropdown" id="menu-dropdown" style="display:none;">
                    <button id="history-btn" class="menu-item">History</button>
                    <button id="browse-universes-btn" class="menu-item">Browse Community Universes</button>
                </div>
            </div>
        </div>
        
        <div class="browser-content">
            <div id="universe-selector" class="universe-selector">
                <div class="universe-selector-content">
                    <h1>Select or Create Universe</h1>
                    <div class="universe-options">
                        <div class="existing-universes">
                            <h3>Existing Universes</h3>
                            <div id="universe-list" class="universe-list"></div>
                        </div>
                        
                        <div class="create-universe">
                            <h3>Manage Universe</h3>
                            <input type="hidden" id="edit-universe-id" />
                            <input type="text" id="universe-name" placeholder="Universe name (e.g., Middle Earth, Star Wars)" />
                            <textarea id="universe-lore" placeholder="Describe the universe's lore, technology level, major factions, key events, etc."></textarea>
                            <div style="margin-bottom: 12px;">
                                <label style="display: flex; align-items: center; gap: 8px; color: #ccc; font-size: 14px; cursor: pointer;">
                                    <input type="checkbox" id="elaborate-lore" checked style="accent-color: #0066cc;">
                                    Use AI to elaborate and expand the world description
                                </label>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button id="create-universe-btn">Create Universe</button>
                                <button id="update-universe-btn" style="display: none; background: #ffc107;">Update Universe</button>
                                <button id="cancel-edit-btn" style="display: none; background: #6c757d;">Cancel</button>
                            </div>
                            <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #444;">
                                <input type="file" id="import-file-input" accept=".json" style="display: none;" />
                                <button id="import-universe-btn" style="background: #17a2b8; border: none; color: #fff; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-family: inherit; font-weight: bold;">Import Universe</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="web-content" class="web-content hidden">
                <div id="loading" class="loading hidden">
                    <div class="loading-spinner"></div>
                    <p>Connecting to the Multiverse...</p>
                </div>
                <div id="page-content"></div>
            </div>
        </div>
    </div>
    
    <script type="module" src="main.js"></script>
</body>
</html>
